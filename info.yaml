# Tiny Tapeout project information
project:
  title:        "miniMAC_IHP"  # Project title
  author:       "Yann Guidon"  # Your name
  discord:      "the_yasep"    # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "16-bit Scrambler/Framer/Error detector, generic IHP PDK" # One line description of what your project does
  language:     "Verilog"      # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000000      # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"   # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2, 8x2, 3x4, 4x4, 5x4, 6x4, 8x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module: "tt_um_miniMAC"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "modules.v"
    - "Hammer18.v"
    - "gPEAC18.v"
    - "pipelines.v"
    - "sg13_cells_sg13cmos5l.v" # change to target techno
  # sg13_cells_sg13cmos5l.v , sg13_cells_sg13g2.v and sg13_cells_sim.v are not real "source files"
  # but must be placed in the right directories and added to the proper sections of test/Makefile
  # - sg13_cells_sg13cmos5l.v , sg13_cells_sg13g2.v go to src/
  # - sg13_cells_sim.v goes to test

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "DI0"
  ui[1]: "DI1"
  ui[2]: "DI2"
  ui[3]: "DI3"
  ui[4]: "DI4"
  ui[5]: "DI5"
  ui[6]: "DI6"
  ui[7]: "DI7"

  # Outputs
  uo[0]: "DO0"
  uo[1]: "DO1"
  uo[2]: "DO2"
  uo[3]: "DO3"
  uo[4]: "DO4"
  uo[5]: "DO5"
  uo[6]: "DO6"
  uo[7]: "DO7"

  # Bidirectional pins
  uio[0]: "D08"
  uio[1]: "QEN"
  uio[2]: "CLK_out"
  uio[3]: "Zero"
  uio[4]: "Enc"
  uio[5]: "Dec"
  uio[6]: "DEN"
  uio[7]: "DI8"

# Do not change!
yaml_version: 6
